`;

  // ── Init Ace editor ──
  const editor = ace.edit("editor");
  editor.setOptions({
    mode: "ace/mode/markdown",
    theme: "ace/theme/chrome",
    fontSize: 14,
    wrap: true,
    showPrintMargin: false,
    tabSize: 2,
    useSoftTabs: true,
    showGutter: true,
    highlightActiveLine: true,
    scrollPastEnd: 0.5,
    placeholder: "Type your Markdown here..."
  });

  // Load saved content or default
  const saved = localStorage.getItem("md-content");
  editor.setValue(saved !== null ? saved : DEFAULT_MD, -1);

  // ── Configure Marked ──
  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; }
        catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; }
      catch(e) {}
      return code;
    }
  });

  // ── Render preview ──
  const preview = document.getElementById("preview");

  function renderPreview() {
    const md = editor.getValue();
    preview.innerHTML = marked.parse(md);
    localStorage.setItem("md-content", md);
  }

  editor.getSession().on("change", renderPreview);
  renderPreview();

  // ── Sync Scroll ──
  let syncEnabled = true;
  let scrolling = null;

  const toggleSync = document.getElementById("toggle-sync");
  toggleSync.addEventListener("change", () => { syncEnabled = toggleSync.checked; });

  // Editor scroll → Preview scroll
  editor.getSession().on("changeScrollTop", function(scrollTop) {
    if (!syncEnabled || scrolling === "preview") return;
    scrolling = "editor";
    const maxScroll = editor.getSession().getScreenLength() * editor.renderer.lineHeight - editor.renderer.$size.scrollerHeight;
    const ratio = maxScroll > 0 ? scrollTop / maxScroll : 0;
    const previewMax = preview.scrollHeight - preview.clientHeight;
    preview.scrollTop = ratio * previewMax;
    requestAnimationFrame(() => { scrolling = null; });
  });

  // Preview scroll → Editor scroll
  preview.addEventListener("scroll", function() {
    if (!syncEnabled || scrolling === "editor") return;
    scrolling = "preview";
    const previewMax = preview.scrollHeight - preview.clientHeight;
    const ratio = previewMax > 0 ? preview.scrollTop / previewMax : 0;
    const maxScroll = editor.getSession().getScreenLength() * editor.renderer.lineHeight - editor.renderer.$size.scrollerHeight;
    editor.getSession().setScrollTop(ratio * maxScroll);
    requestAnimationFrame(() => { scrolling = null; });
  });

  // ── Dark Mode ──
  const toggleDark = document.getElementById("toggle-dark");
  const hljsLight = document.getElementById("hljs-light");
  const hljsDark = document.getElementById("hljs-dark");

  // Check saved preference
  if (localStorage.getItem("md-dark") === "true") {
    toggleDark.checked = true;
    applyTheme(true);
  }

  toggleDark.addEventListener("change", () => {
    applyTheme(toggleDark.checked);
    localStorage.setItem("md-dark", toggleDark.checked);
  });

  function applyTheme(dark) {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    editor.setTheme(dark ? "ace/theme/one_dark" : "ace/theme/chrome");
    hljsLight.disabled = dark;
    hljsDark.disabled = !dark;
    renderPreview();
  }

  // ── Reset ──
  document.getElementById("btn-reset").addEventListener("click", () => {
    editor.setValue(DEFAULT_MD, -1);
    showToast("Reset to default content");
  });

  // ── Copy ──
  document.getElementById("btn-copy").addEventListener("click", () => {
    navigator.clipboard.writeText(editor.getValue()).then(() => {
      showToast("Markdown copied to clipboard!");
    }).catch(() => {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = editor.getValue();
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("Markdown copied to clipboard!");
    });
  });

  // ── Export PDF ──
  document.getElementById("btn-pdf").addEventListener("click", () => {
    showToast("Generating PDF...");
    const clone = preview.cloneNode(true);
    clone.style.padding = "40px";
    clone.style.background = "#fff";
    clone.style.color = "#1a1d23";
    
    html2pdf().set({
      margin: [10, 10, 10, 10],
      filename: 'markdown-preview.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    }).from(clone).save().then(() => {
      showToast("PDF exported successfully!");
    });
  });

  // ── Resizable divider ──
  const divider = document.getElementById("divider");
  const editorPanel = document.getElementById("editor-panel");
  const previewPanel = document.getElementById("preview-panel");
  let isDragging = false;

  divider.addEventListener("mousedown", (e) => {
    isDragging = true;
    divider.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    const container = document.querySelector(".main");
    const rect = container.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.min(Math.max(pct, 20), 80);
    editorPanel.style.flex = "none";
    previewPanel.style.flex = "none";
    editorPanel.style.width = clamped + "%";
    previewPanel.style.width = (100 - clamped) + "%";
    editor.resize();
  });

  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove("dragging");
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    }
  });

  // ── Toast ──
  let toastTimeout;
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") {
      e.preventDefault();
      showToast("Content auto-saved to browser storage");
    }
  });

})();
</script>
</body>
</html>
